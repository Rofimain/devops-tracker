name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.lower.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: lower
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.lower.outputs.image }}:latest
            ${{ steps.lower.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Lowercase image name
        id: lower
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          command_timeout: 15m
          script: |
            set -e
            cd /opt/devops-tracker
            IMAGE="${{ steps.lower.outputs.image }}"
            echo "Image: ${IMAGE}:latest"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${IMAGE}:latest

            # Pastikan folder upload di host ada (persist lintas deploy/recreate).
            mkdir -p /opt/devops-tracker/data/uploads/docs \
                     /opt/devops-tracker/data/uploads/report-monitoring \
                     /opt/devops-tracker/data/uploads/web-decommissioned

            # Rescue: salin file dari container yang sedang jalan (kalau upload masih di layer container).
            if docker ps --format '{{.Names}}' | grep -qx 'devops_app'; then
              echo "Copying /app/uploads from running container -> ./data/uploads"
              docker cp devops_app:/app/uploads/. /opt/devops-tracker/data/uploads/ 2>/dev/null || true
            fi

            # One-time migrate dari named volume lama (jika masih ada isinya).
            OLD_VOL=$(docker volume ls -q | grep -E '_doc_uploads$' | head -n1 || true)
            if [ -n "$OLD_VOL" ]; then
              echo "Merging uploads from volume: $OLD_VOL"
              docker run --rm \
                -v "${OLD_VOL}:/from:ro" \
                -v /opt/devops-tracker/data/uploads:/to \
                alpine:3.20 sh -c 'cp -a /from/. /to/ 2>/dev/null || true'
            fi

            echo "Upload files on host (before deploy):"
            find /opt/devops-tracker/data/uploads -type f 2>/dev/null | wc -l || true

            # Pastikan docker-compose.yml app service mount ./data/uploads
            python3 <<'PY'
            from pathlib import Path
            import re
            p = Path("docker-compose.yml")
            text = p.read_text()
            if "./data/uploads:/app/uploads" in text:
                print("compose already has ./data/uploads bind mount")
            elif "doc_uploads:/app/uploads" in text:
                text = text.replace("- doc_uploads:/app/uploads", "- ./data/uploads:/app/uploads")
                p.write_text(text)
                print("replaced doc_uploads named volume with ./data/uploads")
            else:
                # Sisipkan volumes di service app setelah networks: - app_net
                pat = re.compile(
                    r"(  app:\n(?:    .*\n)*?    networks:\n      - app_net\n)",
                    re.M,
                )
                m = pat.search(text)
                if not m:
                    raise SystemExit("ERROR: tidak menemukan block service app di docker-compose.yml")
                insert = m.group(1) + "    volumes:\n      - ./data/uploads:/app/uploads\n"
                text = text[: m.start()] + insert + text[m.end() :]
                # bersihkan deklarasi volume doc_uploads jika ada
                text = re.sub(r"\n  doc_uploads:\n    driver: local\n?", "\n", text)
                p.write_text(text)
                print("inserted ./data/uploads bind mount into app service")
            if "./data/uploads:/app/uploads" not in p.read_text():
                raise SystemExit("ERROR: gagal memastikan mount ./data/uploads")
            PY

            echo "=== app volumes snippet ==="
            grep -n 'uploads\|volumes:' -A2 docker-compose.yml | head -30

            DB_PASS=$(grep '^DB_PASSWORD' /opt/devops-tracker/.env | cut -d= -f2 | tr -d '"' | tr -d "'")
            # JANGAN pakai --accept-data-loss: itu boleh drop kolom/tabel & hapus data gambar.
            docker run --rm \
              --network devops-tracker_app_net \
              -e DATABASE_URL="postgresql://devops_user:${DB_PASS}@db:5432/devops_tracker" \
              --entrypoint sh \
              ${IMAGE}:latest \
              -c "npx prisma@5 db push --skip-generate"

            if ! grep -q 'CRON_SECRET' docker-compose.yml 2>/dev/null; then
              perl -0pi -e 's/(SUPER_ADMIN_EMAIL: \$\{SUPER_ADMIN_EMAIL\}\n)/$1      CRON_SECRET: \${CRON_SECRET:-}\n/ unless /CRON_SECRET/' docker-compose.yml
            fi
            if grep -q '^CRON_SECRET=' .env; then
              export CRON_SECRET="$(grep '^CRON_SECRET=' .env | cut -d= -f2- | tr -d '\r' | tr -d '"')"
            fi

            # Recreate app saja — JANGAN docker compose down -v / volume prune.
            docker compose pull app
            docker compose stop app || true
            docker rm -f devops_app 2>/dev/null || true
            docker ps -a --filter "name=devops_app" -q | xargs -r docker rm -f
            docker compose up -d --no-deps --force-recreate app

            echo "Mounts on devops_app:"
            docker inspect devops_app --format '{{range .Mounts}}{{.Type}} {{.Source}} -> {{.Destination}}{{println}}{{end}}' || true
            echo "Upload files on host (after deploy):"
            find /opt/devops-tracker/data/uploads -type f 2>/dev/null | wc -l || true
            echo "Upload files inside container:"
            docker exec devops_app sh -c 'find /app/uploads -type f 2>/dev/null | wc -l' || true

            docker image prune -f
            echo "Deploy selesai!"
