name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.lower.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: lower
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.lower.outputs.image }}:latest
            ${{ steps.lower.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Lowercase image name
        id: lower
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          command_timeout: 15m
          script: |
            set -e
            cd /opt/devops-tracker
            IMAGE="${{ steps.lower.outputs.image }}"
            echo "Image: ${IMAGE}:latest"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${IMAGE}:latest
            DB_PASS=$(grep '^DB_PASSWORD' /opt/devops-tracker/.env | cut -d= -f2 | tr -d '"' | tr -d "'")
            docker run --rm \
              --network devops-tracker_app_net \
              -e DATABASE_URL="postgresql://devops_user:${DB_PASS}@db:5432/devops_tracker" \
              ${IMAGE}:latest \
              sh -c "npx prisma@5 migrate deploy"
            docker compose up -d --no-deps --force-recreate app
            docker image prune -f
            echo "Deploy selesai!"
