name: Daily Monitoring Auto-fill

on:
  schedule:
    # 15:00 WIB = 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  autofill:
    name: Create daily monitoring entry
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron endpoint
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/daily-monitoring"
