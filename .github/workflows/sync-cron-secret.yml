name: Sync CRON_SECRET to Server

on:
  workflow_dispatch:

jobs:
  sync:
    name: Update server .env and restart app
    runs-on: ubuntu-latest
    steps:
      - name: Sync CRON_SECRET via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          command_timeout: 5m
          envs: CRON_SECRET
          script: |
            set -e
            cd /opt/devops-tracker
            if [ -z "$CRON_SECRET" ]; then
              echo "CRON_SECRET tidak ter-forward ke SSH session"
              exit 1
            fi
            if ! grep -q 'CRON_SECRET' docker-compose.yml 2>/dev/null; then
              perl -0pi -e 's/(SUPER_ADMIN_EMAIL: \$\{SUPER_ADMIN_EMAIL\}\n)/$1      CRON_SECRET: \${CRON_SECRET:-}\n/ unless /CRON_SECRET/' docker-compose.yml
              echo "docker-compose.yml di-patch: tambah CRON_SECRET"
            fi
            if grep -q '^CRON_SECRET=' .env; then
              grep -v '^CRON_SECRET=' .env > .env.tmp
            else
              cp .env .env.tmp
            fi
            printf 'CRON_SECRET=%s\n' "$CRON_SECRET" >> .env.tmp
            mv .env.tmp .env
            export CRON_SECRET
            docker compose up -d --force-recreate app
            sleep 3
            LEN="$(docker compose exec -T app sh -c 'printf %s "$CRON_SECRET" | wc -c' | tr -d ' ')"
            echo "CRON_SECRET length in container: ${LEN}"
            if [ "${LEN:-0}" -lt 8 ]; then
              echo "CRON_SECRET tidak masuk ke container app"
              exit 1
            fi
            docker compose exec -T app sh -c \
              "curl -sfS -X POST -H \"Authorization: Bearer \$CRON_SECRET\" http://127.0.0.1:3000/api/cron/daily-monitoring?slot=1"
            echo "Cron endpoint OK dari dalam server."
