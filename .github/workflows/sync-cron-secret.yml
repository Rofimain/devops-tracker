name: Sync CRON_SECRET to Server

on:
  workflow_dispatch:

jobs:
  sync:
    name: Update server .env and restart app
    runs-on: ubuntu-latest
    steps:
      - name: Sync CRON_SECRET via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          command_timeout: 5m
          envs: CRON_SECRET
          script: |
            set -e
            cd /opt/devops-tracker
            if [ -z "$CRON_SECRET" ]; then
              echo "CRON_SECRET kosong di GitHub Secrets"
              exit 1
            fi
            if grep -q '^CRON_SECRET=' .env; then
              grep -v '^CRON_SECRET=' .env > .env.tmp
            else
              cp .env .env.tmp
            fi
            printf 'CRON_SECRET=%s\n' "$CRON_SECRET" >> .env.tmp
            mv .env.tmp .env
            docker compose up -d --force-recreate app
            echo "CRON_SECRET disinkronkan dan app di-restart."
